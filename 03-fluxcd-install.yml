---
- name: Install Flux CD
  hosts: localhost
  gather_facts: false
  vars:
    github_user: "23hp"
    github_repo: "immutable-gate-apps"
    github_path: "clusters/immutableGate"
    # github_pat: ""
    # init-config ConfigMap for FluxCD controllers
    host_ip: "192.168.20.3"
    # domain_name: "immutable-gate.com"
    # acme_email: "admin@immutable-gate.com"
  tasks:
    - name: Remove Flux CD from Kubernetes cluster
      ansible.builtin.command: flux uninstall --namespace=flux-system --silent
      tags: [never]

    - name: Create namespace
      kubernetes.core.k8s:
        name: flux-system
        kind: Namespace
        state: present

    - name: Install flux CD
      environment:
        GITHUB_TOKEN: "{{ github_pat }}"
      ansible.builtin.command: |
        flux bootstrap github \
          --owner={{ github_user }} \
          --repository={{ github_repo }} \
          --path={{ github_path }} \
          --personal

    - name: Deploy AGE key for FluxCD
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: sops-age
            namespace: flux-system
          stringData:
            age.agekey: "{{ lookup('env', 'SOPS_AGE_KEY') }}"

    - name: Deploy initial config
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: init-config
            namespace: flux-system
          data:
            domain_name: "{{ domain_name }}"
            host_ip: "{{ host_ip }}"
            acme_email: "{{ acme_email }}"
