---
- name: Get latest stable Kubernetes version from official API
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    method: GET
    status_code: 200
    return_content: true
  register: k8s_version_response
  retries: 3
  delay: 5
  until: k8s_version_response.status == 200

- name: Set talos_k8s_version fact
  ansible.builtin.set_fact:
    talos_k8s_version: "{{ k8s_version_response.content | trim }}"
    cacheable: true
