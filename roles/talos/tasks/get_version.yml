---
- name: Fetch available Talos versions from Image Factory
  ansible.builtin.uri:
    url: https://factory.talos.dev/versions
    method: GET
    status_code: 200
    return_content: true
  register: talos_versions_response
  retries: 3
  delay: 5
  until: talos_versions_response.status == 200

- name: Extract the latest stable version
  ansible.builtin.set_fact:
    talos_version: "{{ talos_versions_response.content | from_json | reject('search', 'alpha|beta|-rc') | list | last }}"
    cacheable: true
