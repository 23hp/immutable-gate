---
# Operation control
talos_tasks:
  - install.yaml
  - upgrade.yaml
  - patch.yaml
talos_patches:
  - network_config.yaml
  - storage_tweak.yaml
  - custom_auth.yaml

talos_device_arch: "amd64"
talos_install_disk: "/dev/nvme0n1"
talos_install_method: "iso" # options: ipxe, iso
talos_cluster_name: "homelab"
talos_node_ip: "192.168.20.2"
# For iPXE installation
talos_config_url: "http://192.168.20.1/controlplane.yaml"

# Generated values
talos_version: v1.12.6
talos_k8s_version: v1.35.3
talos_schematic_id: ""
talos_image_url: "factory.talos.dev/metal-installer/{{ talos_schematic_id }}:{{ talos_version }}"
