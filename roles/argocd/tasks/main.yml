---
- name: Create argocd namespace
  kubernetes.core.k8s:
    name: argocd
    kind: Namespace
    state: present

- name: Install ArgoCD from Official Manifest
  kubernetes.core.k8s:
    state: present
    src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
    namespace: argocd

- name: Deploy Root Application (The "App of Apps")
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'root-app.yaml.j2') }}"
